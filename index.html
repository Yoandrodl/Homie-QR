<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Homie Laundry</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .wrapper { max-width: 400px; margin: 60px auto; }
    .brand { text-align: center; margin-bottom: 30px; }
    .brand h1 { margin: 0; font-size: 28px; background: linear-gradient(135deg, #FF9E7D, #FF6B6B); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .brand p { margin: 0; font-size: 14px; color: #888; font-weight: 500; }
    .customer-link { display: block; text-align: center; margin-top: 25px; font-size: 13px; color: #888; text-decoration: none; transition: color 0.2s; font-weight: 500; }
    .customer-link:hover { color: #FF9E7D; }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="brand">
      <h1>Homie Laundry Samarinda</h1>
      <p>Management System</p>
    </div>

    <div class="card">
      <h2 class="text-center" style="font-size: 20px;">Masuk</h2>
      <p class="subtitle" style="margin-bottom: 30px;">Silakan login untuk melanjutkan.</p>
      
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="username" placeholder="Masukkan username">
      </div>
      <div class="form-group" style="margin-bottom: 25px;">
        <label>Password</label>
        <input type="password" id="password" placeholder="Masukkan password">
      </div>
      
      <button id="login-btn" class="btn">Login</button>
      <div id="error-msg" class="error-msg"></div>
    </div>

    <a href="lacak.html" class="customer-link">Bukan karyawan? Lacak pesanan Anda di sini.</a>
  </div>

  <script>
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwmVsqTzRc1kHwbjarDIU7p_ghxPiDgVHBM_Bds1p-4FYEOWrL1s1wkLriH-x4TD_M56A/exec";

    if (localStorage.getItem('homie_role')) {
      redirectUser(localStorage.getItem('homie_role'));
    }

    document.getElementById('login-btn').addEventListener('click', () => {
      const user = document.getElementById('username').value.trim();
      const pass = document.getElementById('password').value.trim();
      const errBox = document.getElementById('error-msg');
      const btn = document.getElementById('login-btn');

      if (!user || !pass) {
        errBox.textContent = "Username dan Password wajib diisi!";
        errBox.style.display = 'block';
        return;
      }

      errBox.style.display = 'none';
      btn.textContent = "Memeriksa...";
      btn.disabled = true;

      fetch(APPS_SCRIPT_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({ action: 'login', username: user, password: pass })
      })
      .then(res => res.json())
      .then(data => {
        if (data.status === 'success') {
          localStorage.setItem('homie_name', data.user.name);
          localStorage.setItem('homie_role', data.user.role);
          redirectUser(data.user.role);
        } else {
          errBox.textContent = data.message;
          errBox.style.display = 'block';
          btn.textContent = "Login";
          btn.disabled = false;
        }
      })
      .catch(err => {
        errBox.textContent = "Koneksi gagal. Periksa internet Anda.";
        errBox.style.display = 'block';
        btn.textContent = "Login";
        btn.disabled = false;
      });
    });

    function redirectUser(role) {
      if (role === 'Admin') {
        window.location.href = "admin.html";
      } else if (role === 'Timbang') {
        window.location.href = "timbang.html";
      } else {
        window.location.href = "scanner.html";
      }
    }
  </script>
</body>
</html>
