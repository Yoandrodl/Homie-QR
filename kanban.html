<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Laporan Operasional - Homie Laundry</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
  <style>
    .wrapper { max-width: 650px; margin: 0 auto; }
    
    .date-subtitle { text-align: left; color: #888; font-size: 14px; margin-top: 0; margin-bottom: 25px; font-weight: 500; }

    .report-container { display: flex; flex-direction: column; gap: 18px; padding-bottom: 40px; }
    
    .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .card-id { font-size: 13px; color: #888; font-weight: 500; }
    .card-status { font-size: 11px; font-weight: bold; background: linear-gradient(135deg, #a1c4fd, #c2e9fb); color: #1a4a66; padding: 4px 10px; border-radius: 12px; }
    
    .card-name { font-weight: 600; margin: 0; font-size: 18px; color: #2b3a4a; }
    .card-details { font-size: 13px; color: #555; font-weight: 500; }
    
    .name-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px; }
    
    .timeline { display: flex; align-items: flex-start; justify-content: space-between; gap: 5px; font-size: 11px; color: #888; border-top: 1px dashed rgba(0,0,0,0.1); padding-top: 12px; overflow-x: auto; }
    .step { display: flex; flex-direction: column; align-items: center; min-width: 42px; }
    .step-icon { font-size: 16px; margin-bottom: 4px; filter: drop-shadow(0 2px 2px rgba(0,0,0,0.05)); }
    .step-name { font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 50px; }
    .arrow { color: #ccc; padding-top: 4px; font-size: 10px; }

    .btn-print-qr { background: transparent; border: 1px solid #ddd; border-radius: 6px; padding: 4px 8px; font-size: 12px; cursor: pointer; color: #555; transition: all 0.2s; font-family: inherit; }
    .btn-print-qr:hover { background: #f0f0f0; border-color: #ccc; }

    /* Modal for QR Print */
    .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(5px); display: none; align-items: center; justify-content: center; z-index: 999; }
    .modal-content { background: white; padding: 30px; border-radius: 20px; text-align: center; max-width: 300px; width: 90%; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
    #modal-qr-code { margin: 20px auto; padding: 10px; background: white; border-radius: 12px; border: 1px solid #eee; display: inline-block; }
    .modal-order-id { font-size: 24px; font-weight: 700; color: #333; letter-spacing: 1px; margin-bottom: 5px; }
    
    @media print {
      body * { visibility: hidden; }
      #print-area, #print-area * { visibility: visible; }
      #print-area { position: absolute; left: 0; top: 0; width: 100%; text-align: center; }
      .modal-overlay { background: none; }
      .btn { display: none !important; }
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="nav" style="margin-bottom: 10px;">
      <h2 style="margin:0;">Laporan Operasional</h2>
      <a href="#" onclick="history.back(); return false;" class="btn-header">Kembali</a>
    </div>
    <p class="date-subtitle" id="current-date"></p>
    
    <div class="card" style="padding: 15px; margin-bottom: 25px;">
      <label style="margin-bottom: 8px; font-size: 13px;">Pencarian & Filter:</label>
      <input type="text" id="search-input" placeholder="Cari Nama atau ID Pesanan..." style="margin-bottom: 10px; padding: 10px; border-radius: 8px; width: 100%; box-sizing: border-box; font-size: 14px;">
      <div style="display: flex; gap: 10px; align-items: center;">
        <input type="date" id="filter-date" style="padding: 10px; border-radius: 8px; flex: 1; margin: 0;">
        <button id="btn-filter" class="btn" style="width: auto; margin: 0; padding: 10px 20px;">Terapkan</button>
        <button id="btn-reset" class="btn btn-secondary" style="width: auto; margin: 0; padding: 10px 20px;">Semua</button>
      </div>
    </div>
    <div id="loading" class="text-center" style="margin-top: 50px; color: #888;">Memuat data dari database...</div>

    <div class="report-container" id="report-list" style="display: none;"></div>
  </div>

  <!-- QR Modal -->
  <div class="modal-overlay" id="qr-modal">
    <div class="modal-content" id="print-area">
      <h3 style="margin-top:0; color:#2b3a4a; font-size: 20px;">Cetak Resi QR</h3>
      <div class="modal-order-id" id="modal-display-id"></div>
      <div id="modal-qr-code"></div>
      <div style="display:flex; gap: 10px; margin-top: 15px;">
        <button class="btn btn-secondary" onclick="closeModal()">Tutup</button>
        <button class="btn" style="margin-top:0;" onclick="window.print()">🖨️ Print</button>
      </div>
    </div>
  </div>

  <script>
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwmVsqTzRc1kHwbjarDIU7p_ghxPiDgVHBM_Bds1p-4FYEOWrL1s1wkLriH-x4TD_M56A/exec";
    
    if (!localStorage.getItem('homie_role')) {
      window.location.href = "index.html";
    }

    const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
    document.getElementById('current-date').textContent = new Date().toLocaleDateString('id-ID', options);

    let allOrders = [];

    function loadData() {
      fetch(APPS_SCRIPT_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({ action: 'get_kanban' })
      })
      .then(res => res.json())
      .then(res => {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('report-list').style.display = 'flex';
        
        if (res.status === 'success') {
          allOrders = res.data;
          document.getElementById('filter-date').value = getTodayDateString();
          applyFilters();
        } else {
          alert(res.message);
        }
      })
      .catch(err => {
        document.getElementById('loading').textContent = "Gagal memuat data. Periksa koneksi internet.";
      });
    }

    function renderList(orders) {
      const container = document.getElementById('report-list');
      container.innerHTML = "";

      orders.reverse().forEach(order => {
        const card = document.createElement('div');
        card.className = 'card';
        
        const orderId = order["Order ID"] || "-";
        const jmlPcs = order["Jumlah pakaian"] || order["Jumlah Pakaian"] || 0;
        const picTbg = order["Timbang"] || "-";
        const picCuci = order["Cuci"] || "-";
        const picKering = order["Pengeringan"] || "-";
        const picSet = order["Setrika"] || "-";
        const picPack = order["Packing"] || "-";
        const picKurir = order["Kurir"] || "-";
        const statusTxt = order["Status Terakhir"] || "-";

        card.innerHTML = `
          <div class="card-header">
            <div class="card-id">${orderId} &nbsp; <button class="btn-print-qr" onclick="showQR('${orderId}')">🖨️ Cetak QR</button></div>
            <div class="card-status">${statusTxt}</div>
          </div>
          
          <div class="name-row">
            <p class="card-name">${order["Nama Pelanggan"] || "-"}</p>
            <div class="card-details">
              <span title="Berat">⚖️ ${order["Berat"] || 0} Kg</span> &nbsp;&nbsp;
              <span title="Jumlah Pakaian">👕 ${jmlPcs} Pcs</span>
            </div>
          </div>
          
          <div class="timeline">
            <div class="step" title="Timbang"><span class="step-icon">⚖️</span><span class="step-name">${picTbg}</span></div>
            <span class="arrow">➔</span>
            <div class="step" title="Cuci"><span class="step-icon">💧</span><span class="step-name">${picCuci}</span></div>
            <span class="arrow">➔</span>
            <div class="step" title="Pengeringan"><span class="step-icon">🌬️</span><span class="step-name">${picKering}</span></div>
            <span class="arrow">➔</span>
            <div class="step" title="Setrika"><span class="step-icon">👔</span><span class="step-name">${picSet}</span></div>
            <span class="arrow">➔</span>
            <div class="step" title="Packing"><span class="step-icon">📦</span><span class="step-name">${picPack}</span></div>
            <span class="arrow">➔</span>
            <div class="step" title="Kurir"><span class="step-icon">🛵</span><span class="step-name">${picKurir}</span></div>
          </div>
        `;
        container.appendChild(card);
      });
    }

    function showQR(orderId) {
      if (orderId === "-") return;
      document.getElementById('modal-display-id').textContent = orderId;
      const qr = qrcode(0, 'M');
      qr.addData(orderId);
      qr.make();
      document.getElementById('modal-qr-code').innerHTML = qr.createImgTag(5, 0);
      document.getElementById('qr-modal').style.display = 'flex';
    }

    function closeModal() {
      document.getElementById('qr-modal').style.display = 'none';
    }

    function getTodayDateString() {
      const d = new Date();
      return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
    }

    function applyFilters() {
      const dateVal = document.getElementById('filter-date').value;
      const searchVal = document.getElementById('search-input').value.toLowerCase().trim();
      
      let filtered = allOrders;

      if (dateVal) {
        const parts = dateVal.split('-');
        const y = parts[0];
        const m = parts[1];
        const d = parts[2];
        
        const f1 = `${d}/${m}/${y}`; 
        const f2 = `${parseInt(d)}/${parseInt(m)}/${y}`; 
        const f3 = `${m}/${d}/${y}`; 
        const f4 = `${parseInt(m)}/${parseInt(d)}/${y}`; 
        const f5 = dateVal; 

        filtered = filtered.filter(order => {
          const tglMasuk = order["Tanggal Masuk"] || "";
          return tglMasuk.startsWith(f1) || tglMasuk.startsWith(f2) || tglMasuk.startsWith(f3) || tglMasuk.startsWith(f4) || tglMasuk.startsWith(f5);
        });
      }

      if (searchVal) {
        filtered = filtered.filter(order => {
          const nama = (order["Nama Pelanggan"] || "").toLowerCase();
          const id = (order["Order ID"] || "").toLowerCase();
          return nama.includes(searchVal) || id.includes(searchVal);
        });
      }

      renderList(filtered);
    }

    document.getElementById('btn-filter').addEventListener('click', applyFilters);
    document.getElementById('search-input').addEventListener('input', applyFilters);

    document.getElementById('btn-reset').addEventListener('click', () => {
      document.getElementById('filter-date').value = "";
      document.getElementById('search-input').value = "";
      applyFilters();
    });

    loadData();
  </script>
</body>
</html>
