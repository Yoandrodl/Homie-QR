<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Laporan Operasional - Homie Laundry</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; background-color: #f7f7f5; color: #37352f; padding: 20px; margin: 0; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; max-width: 600px; margin-left: auto; margin-right: auto; }
    h2 { font-weight: 600; color: #2eaadc; margin: 0; }
    .btn-back { text-decoration: none; color: #787774; background: #fff; padding: 8px 15px; border-radius: 6px; border: 1px solid #e1e1e1; font-size: 14px; font-weight: 500; }
    
    .date-subtitle { text-align: left; color: #787774; font-size: 14px; margin-top: 0; margin-bottom: 25px; font-weight: 500; max-width: 600px; margin-left: auto; margin-right: auto; }

    .report-container { max-width: 600px; margin: 0 auto; padding-bottom: 30px; display: flex; flex-direction: column; gap: 15px; }
    
    .card { background: #fff; padding: 15px; border-radius: 6px; box-shadow: 0 2px 5px rgba(0,0,0,0.06); border-left: 4px solid #2eaadc; }
    .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .card-id { font-size: 12px; color: #787774; }
    .card-status { font-size: 11px; font-weight: bold; background: #e5f4fa; color: #007bc0; padding: 4px 8px; border-radius: 12px; }
    
    .card-name { font-weight: 600; margin: 0; font-size: 16px; }
    .card-details { font-size: 12px; color: #555; }
    
    .name-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .timeline { display: flex; align-items: flex-start; justify-content: space-between; gap: 4px; font-size: 11px; color: #787774; border-top: 1px dashed #eee; padding-top: 10px; overflow-x: auto; }
    .step { display: flex; flex-direction: column; align-items: center; min-width: 40px; }
    .step-icon { font-size: 14px; margin-bottom: 2px; }
    .step-name { font-weight: normal; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 45px; }
    .arrow { color: #ccc; padding-top: 2px; font-size: 10px; }

    #loading { text-align: center; margin-top: 50px; color: #787774; }
  </style>
</head>
<body>
  <div class="header">
    <h2>Laporan Operasional</h2>
    <a href="admin.html" class="btn-back">Kembali</a>
  </div>
  <p class="date-subtitle" id="current-date"></p>

  <div id="loading">Memuat data dari database...</div>

  <div class="report-container" id="report-list" style="display: none;"></div>

  <script>
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwmVsqTzRc1kHwbjarDIU7p_ghxPiDgVHBM_Bds1p-4FYEOWrL1s1wkLriH-x4TD_M56A/exec";
    
    if (localStorage.getItem('homie_role') !== 'Admin') {
      window.location.href = "index.html";
    }

    // Set tanggal hari ini
    const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
    document.getElementById('current-date').textContent = new Date().toLocaleDateString('id-ID', options);

    function loadData() {
      fetch(APPS_SCRIPT_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({ action: 'get_kanban' })
      })
      .then(res => res.json())
      .then(res => {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('report-list').style.display = 'flex';
        
        if (res.status === 'success') {
          renderList(res.data);
        } else {
          alert(res.message);
        }
      })
      .catch(err => {
        document.getElementById('loading').textContent = "Gagal memuat data. Periksa koneksi internet.";
      });
    }

    function renderList(orders) {
      const container = document.getElementById('report-list');
      container.innerHTML = "";

      // Dibalik agar pesanan terbaru (baris paling bawah di Sheet) muncul paling atas
      orders.reverse().forEach(order => {
        const card = document.createElement('div');
        card.className = 'card';
        
        const jmlPcs = order["Jumlah pakaian"] || order["Jumlah Pakaian"] || 0;
        const picTbg = order["Timbang"] || "-";
        const picCuci = order["Cuci"] || "-";
        const picKering = order["Pengeringan"] || "-";
        const picSet = order["Setrika"] || "-";
        const picPack = order["Packing"] || "-";
        const picKurir = order["Kurir"] || "-";
        const statusTxt = order["Status Terakhir"] || "-";

        card.innerHTML = `
          <div class="card-header">
            <div class="card-id">${order["Order ID"] || "-"}</div>
            <div class="card-status">${statusTxt}</div>
          </div>
          
          <div class="name-row">
            <p class="card-name">${order["Nama Pelanggan"] || "-"}</p>
            <div class="card-details">
              <span title="Berat">⚖️ ${order["Berat"] || 0} Kg</span> &nbsp;&nbsp;
              <span title="Jumlah Pakaian">👕 ${jmlPcs} Pcs</span>
            </div>
          </div>
          
          <div class="timeline">
            <div class="step" title="Timbang"><span class="step-icon">⚖️</span><span class="step-name">${picTbg}</span></div>
            <span class="arrow">➔</span>
            <div class="step" title="Cuci"><span class="step-icon">💧</span><span class="step-name">${picCuci}</span></div>
            <span class="arrow">➔</span>
            <div class="step" title="Pengeringan"><span class="step-icon">🌬️</span><span class="step-name">${picKering}</span></div>
            <span class="arrow">➔</span>
            <div class="step" title="Setrika"><span class="step-icon">👔</span><span class="step-name">${picSet}</span></div>
            <span class="arrow">➔</span>
            <div class="step" title="Packing"><span class="step-icon">📦</span><span class="step-name">${picPack}</span></div>
            <span class="arrow">➔</span>
            <div class="step" title="Kurir"><span class="step-icon">🛵</span><span class="step-name">${picKurir}</span></div>
          </div>
        `;
        container.appendChild(card);
      });
    }

    loadData();
  </script>
</body>
</html>
