<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lacak Pesanan - Homie Laundry</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .wrapper { max-width: 450px; margin: 60px auto; }
    
    #result-box { display: none; margin-top: 25px; padding: 25px; background: rgba(255,255,255,0.8); border: 1px solid rgba(255,255,255,0.9); }
    .res-label { font-size: 13px; color: #888; margin-bottom: 4px; display: block; font-weight: 500; }
    .res-value { font-size: 18px; font-weight: 700; color: #2b3a4a; margin-bottom: 20px; display: block; }
    
    .status-badge { display: inline-block; padding: 10px 20px; background: linear-gradient(135deg, #a1c4fd, #c2e9fb); color: #1a4a66; border-radius: 50px; font-size: 16px; font-weight: 700; box-shadow: 0 4px 15px rgba(161, 196, 253, 0.3); }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="card">
      <h2 class="text-center">Lacak Laundry</h2>
      <p class="subtitle">Masukkan ID Pesanan / Nomor Resi Anda.</p>
      
      <div class="form-group" style="margin-bottom: 20px;">
        <input type="text" id="orderId" placeholder="Misal: JUL2126-001" style="text-align: center; font-weight: bold; letter-spacing: 1px; font-size: 18px;">
      </div>
      
      <button id="track-btn" class="btn">Lacak Sekarang</button>
      <div id="error-msg" class="error-msg"></div>

      <div id="result-box" class="card" style="box-shadow: none;">
        <span class="res-label">Atas Nama:</span>
        <span class="res-value" id="res-name">-</span>
        
        <span class="res-label">Berat & Jumlah:</span>
        <span class="res-value" id="res-detail" style="font-size: 16px;">-</span>

        <span class="res-label">Status Terkini:</span>
        <div class="status-badge" id="res-status">-</div>
      </div>
    </div>
  </div>

  <script>
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwmVsqTzRc1kHwbjarDIU7p_ghxPiDgVHBM_Bds1p-4FYEOWrL1s1wkLriH-x4TD_M56A/exec";

    document.getElementById('track-btn').addEventListener('click', () => {
      const orderId = document.getElementById('orderId').value.trim();
      const errBox = document.getElementById('error-msg');
      const resBox = document.getElementById('result-box');
      const btn = document.getElementById('track-btn');

      if (!orderId) {
        errBox.textContent = "ID Pesanan wajib diisi!";
        errBox.style.display = 'block';
        resBox.style.display = 'none';
        return;
      }

      errBox.style.display = 'none';
      resBox.style.display = 'none';
      btn.textContent = "Mencari...";
      btn.disabled = true;

      fetch(APPS_SCRIPT_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({ action: 'track_order', orderId: orderId })
      })
      .then(res => res.json())
      .then(data => {
        if (data.status === 'success') {
          const order = data.data;
          const jmlPcs = order["Jumlah pakaian"] || order["Jumlah Pakaian"] || 0;
          document.getElementById('res-name').textContent = order["Nama Pelanggan"];
          document.getElementById('res-detail').textContent = order["Berat"] + " Kg (" + jmlPcs + " Pcs)";
          document.getElementById('res-status').textContent = order["Status Terakhir"];
          resBox.style.display = 'block';
        } else {
          errBox.textContent = data.message;
          errBox.style.display = 'block';
        }
        btn.textContent = "Lacak Sekarang";
        btn.disabled = false;
      })
      .catch(err => {
        errBox.textContent = "Koneksi gagal. Periksa internet Anda.";
        errBox.style.display = 'block';
        btn.textContent = "Lacak Sekarang";
        btn.disabled = false;
      });
    });
  </script>
</body>
</html>
