<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lacak Pesanan - Homie Laundry</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; background-color: #f7f7f5; color: #37352f; padding: 20px; max-width: 400px; margin: 40px auto; }
    .card { background-color: #ffffff; padding: 30px 20px; border-radius: 8px; border: 1px solid #e1e1e1; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
    h2 { font-weight: 600; text-align: center; margin-top: 0; margin-bottom: 5px; color: #2eaadc; }
    p.subtitle { text-align: center; color: #787774; font-size: 14px; margin-bottom: 25px; }
    .form-group { margin-bottom: 15px; }
    input { width: 100%; padding: 12px; border: 1px solid #e1e1e1; border-radius: 6px; font-size: 16px; box-sizing: border-box; background-color: #fcfcfc; text-align: center; font-weight: bold; letter-spacing: 1px; }
    input:focus { outline: none; border-color: #2eaadc; }
    .btn { width: 100%; padding: 12px; border-radius: 6px; font-size: 16px; font-weight: 600; cursor: pointer; border: none; background-color: #2eaadc; color: white; margin-top: 10px; }
    .btn:disabled { background-color: #a8d5e8; cursor: not-allowed; }
    
    #result-box { display: none; margin-top: 25px; padding: 15px; border-radius: 6px; background-color: #ebf5ed; border: 1px solid #c3e2cc; }
    .res-label { font-size: 12px; color: #555; margin-bottom: 3px; display: block; }
    .res-value { font-size: 16px; font-weight: 600; color: #216e4e; margin-bottom: 15px; display: block; }
    
    .status-badge { display: inline-block; padding: 8px 15px; background: #2eaadc; color: white; border-radius: 20px; font-size: 16px; font-weight: bold; }
    
    .error-msg { color: #c92a2a; font-size: 14px; text-align: center; margin-top: 10px; display: none; }
  </style>
</head>
<body>
  <div class="card">
    <h2>Lacak Laundry</h2>
    <p class="subtitle">Masukkan ID Pesanan / Nomor Resi Anda.</p>
    
    <div class="form-group">
      <input type="text" id="orderId" placeholder="Misal: JUL2126-001">
    </div>
    
    <button id="track-btn" class="btn">Lacak Sekarang</button>
    <div id="error-msg" class="error-msg"></div>

    <div id="result-box">
      <span class="res-label">Atas Nama:</span>
      <span class="res-value" id="res-name">-</span>
      
      <span class="res-label">Berat & Jumlah:</span>
      <span class="res-value" id="res-detail">-</span>

      <span class="res-label">Status Terkini:</span>
      <div class="status-badge" id="res-status">-</div>
    </div>
  </div>

  <script>
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxFT2c2CT0ctNu_4mNIMLAd57MYA2EeSSUBcM0OvkEnpgxIuuTMdEStpyznjuT0AiNuVg/exec";

    document.getElementById('track-btn').addEventListener('click', () => {
      const orderId = document.getElementById('orderId').value.trim();
      const errBox = document.getElementById('error-msg');
      const resBox = document.getElementById('result-box');
      const btn = document.getElementById('track-btn');

      if (!orderId) {
        errBox.textContent = "ID Pesanan wajib diisi!";
        errBox.style.display = 'block';
        resBox.style.display = 'none';
        return;
      }

      errBox.style.display = 'none';
      resBox.style.display = 'none';
      btn.textContent = "Mencari...";
      btn.disabled = true;

      fetch(APPS_SCRIPT_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({ action: 'track_order', orderId: orderId })
      })
      .then(res => res.json())
      .then(data => {
        if (data.status === 'success') {
          const order = data.data;
          document.getElementById('res-name').textContent = order["Nama Pelanggan"];
          document.getElementById('res-detail').textContent = order["Berat"] + " Kg (" + order["Jumlah Pakaian"] + " Pcs)";
          document.getElementById('res-status').textContent = order["Status Terakhir"];
          resBox.style.display = 'block';
        } else {
          errBox.textContent = data.message;
          errBox.style.display = 'block';
        }
        btn.textContent = "Lacak Sekarang";
        btn.disabled = false;
      })
      .catch(err => {
        errBox.textContent = "Koneksi gagal. Periksa internet Anda.";
        errBox.style.display = 'block';
        btn.textContent = "Lacak Sekarang";
        btn.disabled = false;
      });
    });
  </script>
</body>
</html>
