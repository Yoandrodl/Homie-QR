<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E-Nota Homie Laundry</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body { background-color: #f7fafc; padding: 20px 10px; font-family: 'Inter', sans-serif; }
    .receipt { max-width: 400px; margin: 0 auto; background: #fff; border-radius: 12px; padding: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.08); border-top: 6px solid #25D366; }
    .receipt-header { text-align: center; margin-bottom: 20px; border-bottom: 1px dashed #cbd5e0; padding-bottom: 15px; }
    .receipt-header h2 { margin: 0; color: #2d3748; font-size: 22px; }
    .receipt-header p { margin: 5px 0 0; color: #718096; font-size: 13px; }
    
    .status-badge { display: inline-block; padding: 6px 12px; border-radius: 50px; font-weight: bold; font-size: 14px; margin-top: 10px; }
    .status-lunas { background: #c6f6d5; color: #276749; }
    .status-belum { background: #fed7d7; color: #9b2c2c; }
    
    .detail-row { display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 14px; color: #4a5568; }
    .detail-label { font-weight: 600; color: #718096; }
    .detail-value { font-weight: 700; color: #2d3748; text-align: right; }
    
    .total-row { display: flex; justify-content: space-between; margin-top: 20px; padding-top: 15px; border-top: 2px dashed #cbd5e0; font-size: 18px; font-weight: 800; color: #1a202c; }
    
    .photo-box { margin-top: 20px; text-align: center; border-radius: 10px; overflow: hidden; border: 1px solid #e2e8f0; display: none; }
    .photo-box img { width: 100%; height: auto; display: block; }
    .photo-caption { background: #edf2f7; padding: 8px; font-size: 12px; color: #4a5568; font-weight: 600; }
    
    .footer-note { text-align: center; margin-top: 25px; font-size: 12px; color: #a0aec0; }
  </style>
</head>
<body>

  <div id="loading" style="text-align: center; margin-top: 50px; color: #718096;">Memuat E-Nota...</div>

  <div class="receipt" id="receipt" style="display: none;">
    <div class="receipt-header">
      <h2>Homie Laundry</h2>
      <p>Samarinda, Kalimantan Timur</p>
      <div id="payment-badge" class="status-badge">Memuat...</div>
    </div>

    <div class="detail-row">
      <span class="detail-label">Order ID</span>
      <span class="detail-value" id="val-order"></span>
    </div>
    <div class="detail-row">
      <span class="detail-label">Tanggal Masuk</span>
      <span class="detail-value" id="val-tanggal"></span>
    </div>
    <div class="detail-row">
      <span class="detail-label">Nama Pelanggan</span>
      <span class="detail-value" id="val-nama"></span>
    </div>
    
    <div style="border-top: 1px dashed #cbd5e0; margin: 15px 0;"></div>

    <div class="detail-row">
      <span class="detail-label">Layanan</span>
      <span class="detail-value" id="val-layanan"></span>
    </div>
    <div class="detail-row">
      <span class="detail-label">Jumlah / Berat</span>
      <span class="detail-value" id="val-qty"></span>
    </div>
    <div class="detail-row">
      <span class="detail-label">Status Pengerjaan</span>
      <span class="detail-value" id="val-status"></span>
    </div>

    <div class="photo-box" id="photo-box">
      <div class="photo-caption">📷 Bukti Timbangan</div>
      <img id="val-foto" src="" alt="Foto Timbangan">
    </div>

    <div class="total-row">
      <span>TOTAL</span>
      <span id="val-total">Rp 0</span>
    </div>

    <div class="footer-note">
      <p>Terima kasih telah mempercayakan pakaian Anda kepada kami!</p>
      <p>Simpan link nota ini untuk melacak status pesanan Anda.</p>
    </div>
  </div>

  <script>
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwmVsqTzRc1kHwbjarDIU7p_ghxPiDgVHBM_Bds1p-4FYEOWrL1s1wkLriH-x4TD_M56A/exec";
    
    const urlParams = new URLSearchParams(window.location.search);
    const orderId = urlParams.get('id');

    if (!orderId) {
      document.getElementById('loading').textContent = "Order ID tidak valid.";
    } else {
      fetch(APPS_SCRIPT_URL, {
        method: 'POST',
        body: JSON.stringify({ action: 'track_order', orderId: orderId })
      })
      .then(res => res.json())
      .then(res => {
        document.getElementById('loading').style.display = 'none';
        
        if (res.status === 'success') {
          document.getElementById('receipt').style.display = 'block';
          const data = res.data;
          
          document.getElementById('val-order').textContent = data["Order ID"];
          document.getElementById('val-tanggal').textContent = data["Tanggal Masuk"];
          document.getElementById('val-nama').textContent = data["Nama Pelanggan"];
          document.getElementById('val-layanan').textContent = data["Jenis Layanan"] || "-";
          
          let qtyText = "-";
          if (data["Berat"] && data["Berat"] !== "0" && data["Berat"] !== 0) {
            qtyText = data["Berat"] + " Kg";
            if (data["Jumlah Pakaian"]) qtyText += ` (${data["Jumlah Pakaian"]} Pcs)`;
          } else if (data["Jumlah Pakaian"]) {
            qtyText = data["Jumlah Pakaian"] + " Pcs";
          } else {
             qtyText = "Menunggu Ditimbang";
             document.getElementById('val-qty').style.color = "#e53e3e";
          }
          document.getElementById('val-qty').textContent = qtyText;
          
          document.getElementById('val-status').textContent = data["Status Terakhir"];
          
          let total = data["Total Harga"];
          if (!total || total === "0" || total === 0) {
            document.getElementById('val-total').textContent = "Menghitung...";
            document.getElementById('val-total').style.color = "#e53e3e";
          } else {
            document.getElementById('val-total').textContent = "Rp " + parseInt(total).toLocaleString('id-ID');
          }

          const badge = document.getElementById('payment-badge');
          if (data["Status Pembayaran"] && data["Status Pembayaran"].includes("Lunas")) {
            badge.textContent = data["Status Pembayaran"].toUpperCase() + " ✅";
            badge.className = "status-badge status-lunas";
          } else {
            badge.textContent = "BELUM BAYAR ❌";
            badge.className = "status-badge status-belum";
          }

          // Handle Photo
          if (data["Link Foto Timbangan"] && data["Link Foto Timbangan"].startsWith("http")) {
             document.getElementById('photo-box').style.display = 'block';
             document.getElementById('val-foto').src = data["Link Foto Timbangan"];
          }

        } else {
          document.getElementById('loading').textContent = res.message;
          document.getElementById('loading').style.display = 'block';
        }
      })
      .catch(err => {
        document.getElementById('loading').textContent = "Koneksi ke server gagal.";
        document.getElementById('loading').style.display = 'block';
      });
    }
  </script>
</body>
</html>
