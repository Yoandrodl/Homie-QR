<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scanner - Homie Laundry</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    .wrapper { max-width: 450px; margin: 0 auto; }
    #reader { width: 100%; max-width: 350px; margin: 0 auto 20px auto; border-radius: 20px; overflow: hidden; border: 4px solid rgba(255,255,255,0.8); background: #000; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
    
    #scan-result { display: none; text-align: center; }
    #scanned-id { font-size: 24px; font-weight: 700; color: #2eaadc; word-break: break-all; margin-bottom: 20px; display: block; }

    #status-box { padding: 15px; border-radius: 12px; text-align: center; font-weight: 600; display: none; margin-top: 15px; font-size: 14px; }
    .success { background: rgba(235, 245, 237, 0.9); color: #216e4e; border: 1px solid #c3e2cc; }
    .error { background: rgba(251, 228, 228, 0.9); color: #c92a2a; border: 1px solid #f4c3c3; }
    .loading { background: rgba(229, 244, 250, 0.9); color: #007bc0; border: 1px solid #bce1f4; }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="nav">
      <a href="#" id="back-link" class="back-btn">Keluar</a>
      <span class="user-badge" id="user-badge">Memuat...</span>
    </div>

    <h2 class="text-center">Stasiun <span id="station-name">...</span></h2>
    <p class="subtitle">Arahkan kamera ke QR Code pesanan.</p>
    
    <div id="reader"></div>
    
    <div id="scan-result" class="card">
      <p style="margin-top:0; margin-bottom: 5px;">ID Pesanan:</p>
      <strong id="scanned-id"></strong>
      <button id="save-btn" class="btn">Selesaikan Proses Ini</button>
      <button id="cancel-btn" class="btn btn-secondary" style="margin-top: 10px;">Batal & Scan Ulang</button>
    </div>

    <div id="status-box"></div>
  </div>

  <script>
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwmVsqTzRc1kHwbjarDIU7p_ghxPiDgVHBM_Bds1p-4FYEOWrL1s1wkLriH-x4TD_M56A/exec"; 
    
    const baseRole = localStorage.getItem('homie_role');
    const picName = localStorage.getItem('homie_name');
    const tempRole = localStorage.getItem('homie_temp_role');
    
    const activeRole = (baseRole === 'Admin' && tempRole) ? tempRole : baseRole;

    if (!baseRole) {
      window.location.href = "index.html";
    }

    document.getElementById('station-name').textContent = activeRole;
    document.getElementById('user-badge').textContent = picName + " (" + activeRole + ")";

    document.getElementById('back-link').addEventListener('click', (e) => {
      e.preventDefault();
      if (baseRole === 'Admin') {
        localStorage.removeItem('homie_temp_role');
        window.location.href = "admin.html";
      } else {
        localStorage.clear();
        window.location.href = "index.html";
      }
    });

    let isProcessing = false;
    let currentScannedText = "";
    let html5QrCode;

    function showStatus(message, type) {
      const box = document.getElementById('status-box');
      box.textContent = message;
      box.className = type;
      box.style.display = 'block';
    }

    function onScanSuccess(decodedText, decodedResult) {
      if (isProcessing) return;
      isProcessing = true; 
      currentScannedText = decodedText;
      
      document.getElementById('scanned-id').textContent = decodedText;
      document.getElementById('reader').style.display = 'none';
      document.getElementById('scan-result').style.display = 'block';
      document.getElementById('status-box').style.display = 'none';
    }

    document.getElementById('save-btn').addEventListener('click', () => {
      showStatus("Menyimpan ke database...", "loading");
      document.getElementById('save-btn').disabled = true;
      document.getElementById('cancel-btn').disabled = true;

      fetch(APPS_SCRIPT_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({ 
          action: 'scan_process', 
          qrText: currentScannedText, 
          role: activeRole, 
          picName: picName 
        })
      })
      .then(response => response.json())
      .then(data => {
        if (data.status === "success") { 
          showStatus(data.message, "success"); 
        } else { 
          showStatus(data.message, "error"); 
        }
        setTimeout(() => { resetScanner(); }, 2000);
      })
      .catch(error => {
        showStatus("Koneksi gagal. Coba lagi.", "error");
        document.getElementById('save-btn').disabled = false;
        document.getElementById('cancel-btn').disabled = false;
      });
    });

    document.getElementById('cancel-btn').addEventListener('click', () => {
      resetScanner();
    });

    function resetScanner() {
      currentScannedText = "";
      isProcessing = false;
      document.getElementById('scan-result').style.display = 'none';
      document.getElementById('status-box').style.display = 'none';
      document.getElementById('reader').style.display = 'block';
      document.getElementById('save-btn').disabled = false;
      document.getElementById('cancel-btn').disabled = false;
    }

    html5QrCode = new Html5Qrcode("reader");
    html5QrCode.start(
      { facingMode: "environment" },
      { fps: 10, qrbox: { width: 250, height: 250 } },
      onScanSuccess
    ).catch(err => {
      showStatus("Akses kamera ditolak atau kamera belakang tidak ditemukan.", "error");
      console.error(err);
    });
  </script>
</body>
</html>
