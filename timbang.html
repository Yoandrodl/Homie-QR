<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Timbang - Homie Laundry</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
  <style>
    .wrapper { max-width: 450px; margin: 0 auto; }
    #result-box { display: none; text-align: center; }
    #qr-code { margin: 20px auto; padding: 15px; background: white; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); display: inline-block; }
    .order-id { font-size: 28px; font-weight: 700; color: #2b3a4a; letter-spacing: 2px; margin-bottom: 10px; }
    
    .antrean-card { background: #fff3cd; border: 1px solid #ffe69c; padding: 15px; border-radius: 12px; margin-bottom: 20px; cursor: pointer; transition: 0.3s; }
    .antrean-card:hover { background: #ffecb5; }
    .antrean-name { font-weight: bold; font-size: 16px; color: #664d03; }
    .antrean-detail { font-size: 13px; color: #856404; margin-top: 5px; }
    
    #form-timbang { display: none; }
    .selected-info { background: #e2e8f0; padding: 15px; border-radius: 12px; margin-bottom: 20px; }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="nav">
      <a href="#" id="back-link" class="back-btn">← Kembali</a>
      <span class="user-badge" id="user-badge">PIC</span>
    </div>

    <div class="card" id="list-card">
      <h2 class="text-center">Antrean Timbang</h2>
      <p class="subtitle text-center">Pilih pesanan yang akan ditimbang.</p>
      <div id="loading" class="text-center" style="color: #718096; margin: 20px 0;">Memuat antrean...</div>
      <div id="antrean-container"></div>
    </div>

    <div class="card" id="form-timbang">
      <div class="selected-info">
        <div style="font-size: 12px; color: #718096;">Menimbang Untuk:</div>
        <div id="selected-name" style="font-weight: bold; font-size: 18px; margin-top: 5px;"></div>
        <div id="selected-service" style="font-size: 14px; margin-top: 3px;"></div>
      </div>
      
      <div class="form-group">
        <label>Berat (Kg)</label>
        <input type="number" step="0.1" id="weight" placeholder="Contoh: 3.5">
      </div>
      <div class="form-group" style="margin-bottom: 25px;">
        <label>Jumlah Pakaian (Pcs)</label>
        <input type="number" id="itemsCount" placeholder="Contoh: 15">
      </div>

      <div style="margin-bottom: 25px; border-top: 1px dashed rgba(0,0,0,0.1); padding-top: 15px;">
        <label style="margin-bottom: 15px;">Dokumentasi (SOP)</label>
        
        <!-- Foto Timbangan -->
        <div style="display: flex; gap: 10px; margin-bottom: 15px; align-items: center;">
          <button id="btn-foto" class="btn btn-secondary" style="margin: 0; flex: 1;">📷 Ambil Foto Timbangan</button>
          <img id="preview-foto" style="width: 50px; height: 50px; object-fit: cover; border-radius: 8px; border: 1px solid #ccc; display: none;">
          <input type="file" id="input-foto" accept="image/*" capture="environment" style="display: none;">
        </div>

        <!-- Video Unboxing -->
        <div style="display: flex; flex-direction: column; gap: 10px;">
          <button id="btn-video-start" class="btn btn-secondary" style="margin: 0;">🎥 Mulai Rekam Video</button>
          <button id="btn-video-stop" class="btn" style="margin: 0; background: #c92a2a; display: none;">🛑 Berhenti Merekam</button>
          
          <video id="video-preview" autoplay muted playsinline style="width: 100%; border-radius: 12px; background: #000; display: none;"></video>
          <div id="video-status" style="font-size: 12px; color: #888; text-align: center; display: none;">Status: <span id="video-timer">Menunggu...</span></div>
        </div>
      </div>
      
      <button id="submit-btn" class="btn btn-success">Simpan Berat & Cetak QR</button>
      <button id="cancel-btn" class="btn btn-secondary" style="margin-top: 10px;">Batal</button>
    </div>

    <div class="card" id="result-box">
      <h3 style="color: #27ae60; margin-top:0; font-size: 22px;">Berhasil Disimpan! 🎉</h3>
      <p style="margin-bottom: 5px;">Order ID:</p>
      <div class="order-id" id="display-order-id"></div>
      <div id="qr-code"></div>
      <div id="manual-download-box" style="margin-top: 15px; display: none; gap: 8px; flex-direction: column;">
        <button id="btn-manual-foto" class="btn btn-secondary" style="font-size: 13px; padding: 10px; margin-top: 0; display: none;">⬇️ Unduh Ulang Foto</button>
        <button id="btn-manual-video" class="btn btn-secondary" style="font-size: 13px; padding: 10px; margin-top: 0; display: none;">⬇️ Unduh Ulang Video</button>
      </div>
      <button id="print-btn" class="btn" style="background: linear-gradient(135deg, #72bde6, #4a90e2); box-shadow: 0 4px 15px rgba(74, 144, 226, 0.3); margin-top: 15px;">🖨️ Print Struk / QR</button>
      <button id="new-btn" class="btn btn-secondary" style="margin-top: 12px;">Kembali ke Antrean</button>
    </div>

  </div>

  <script>
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwmVsqTzRc1kHwbjarDIU7p_ghxPiDgVHBM_Bds1p-4FYEOWrL1s1wkLriH-x4TD_M56A/exec";
    
    const role = localStorage.getItem('homie_role');
    const picName = localStorage.getItem('homie_name') || "Timbang";

    if (!role || (role !== 'Timbang' && role !== 'Admin')) {
      window.location.href = "index.html";
    }

    document.getElementById('user-badge').textContent = picName + " (Timbang)";
    
    document.getElementById('back-link').addEventListener('click', (e) => {
      e.preventDefault();
      if (role === 'Admin') window.location.href = "admin.html";
      else { localStorage.clear(); window.location.href = "index.html"; }
    });

    let servicesDB = [];
    let selectedOrder = null;
    let servicePrice = 0;

    // Load Data
    function loadAntrean() {
      document.getElementById('list-card').style.display = 'block';
      document.getElementById('form-timbang').style.display = 'none';
      document.getElementById('result-box').style.display = 'none';
      document.getElementById('loading').style.display = 'block';
      document.getElementById('antrean-container').innerHTML = "";

      Promise.all([
        fetch(APPS_SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'get_kanban' }) }).then(r => r.json()),
        fetch(APPS_SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'get_services' }) }).then(r => r.json())
      ]).then(([kanbanRes, servRes]) => {
        document.getElementById('loading').style.display = 'none';
        
        if (servRes.status === 'success') servicesDB = servRes.data;
        
        if (kanbanRes.status === 'success') {
          const pending = kanbanRes.data.filter(o => o["Status Terakhir"] === "Menunggu Timbang");
          if (pending.length === 0) {
            document.getElementById('antrean-container').innerHTML = `<div class="text-center" style="color:#718096; padding: 20px;">Tidak ada pesanan yang menunggu ditimbang.</div>`;
            return;
          }

          pending.forEach(order => {
            const div = document.createElement('div');
            div.className = 'antrean-card';
            div.innerHTML = `
              <div class="antrean-name">👤 ${order["Nama Pelanggan"]}</div>
              <div class="antrean-detail">Layanan: ${order["Jenis Layanan"] || "-"}</div>
              <div class="antrean-detail">Order ID: ${order["Order ID"]}</div>
            `;
            div.addEventListener('click', () => selectOrder(order));
            document.getElementById('antrean-container').appendChild(div);
          });
        }
      });
    }

    function selectOrder(order) {
      selectedOrder = order;
      
      // Cari Harga Per Kg
      servicePrice = 0;
      const srv = servicesDB.find(s => s.nama === order["Jenis Layanan"]);
      if (srv) servicePrice = srv.harga;

      document.getElementById('list-card').style.display = 'none';
      document.getElementById('form-timbang').style.display = 'block';
      
      document.getElementById('selected-name').textContent = order["Nama Pelanggan"];
      document.getElementById('selected-service').textContent = `Layanan: ${order["Jenis Layanan"]} (Rp ${servicePrice.toLocaleString('id-ID')}/Kg)`;
      
      document.getElementById('weight').value = "";
      document.getElementById('itemsCount').value = "";
    }

    document.getElementById('cancel-btn').addEventListener('click', loadAntrean);

    // --- FOTO LOGIC ---
    let finalPhotoBlob = null;
    document.getElementById('btn-foto').addEventListener('click', () => {
      document.getElementById('input-foto').click();
    });
    
    document.getElementById('input-foto').addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(event) {
        const img = new Image();
        img.onload = function() {
          const canvas = document.createElement('canvas');
          const MAX_WIDTH = 800; const MAX_HEIGHT = 800;
          let width = img.width; let height = img.height;
          if (width > height) { if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; } } 
          else { if (height > MAX_HEIGHT) { width *= MAX_HEIGHT / height; height = MAX_HEIGHT; } }
          
          canvas.width = width; canvas.height = height;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, width, height);
          
          canvas.toBlob((blob) => {
            finalPhotoBlob = blob;
            const preview = document.getElementById('preview-foto');
            preview.src = URL.createObjectURL(blob);
            preview.style.display = 'block';
            document.getElementById('btn-foto').textContent = "Ubah Foto";
          }, 'image/jpeg', 0.6);
        }
        img.src = event.target.result;
      }
      reader.readAsDataURL(file);
    });

    // --- VIDEO LOGIC ---
    let mediaRecorder;
    let recordedChunks = [];
    let videoStream;
    let finalVideoBlob = null;
    let recordingTimer;
    let recordSeconds = 0;

    const videoPreview = document.getElementById('video-preview');
    const btnVideoStart = document.getElementById('btn-video-start');
    const btnVideoStop = document.getElementById('btn-video-stop');
    const videoStatus = document.getElementById('video-status');
    const videoTimerLabel = document.getElementById('video-timer');

    btnVideoStart.addEventListener('click', async () => {
      try {
        videoStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }, audio: true });
        videoPreview.srcObject = videoStream;
        videoPreview.style.display = 'block';
        videoPreview.play();

        recordedChunks = [];
        mediaRecorder = new MediaRecorder(videoStream, { mimeType: 'video/webm' });
        
        mediaRecorder.ondataavailable = (e) => {
          if (e.data.size > 0) recordedChunks.push(e.data);
        };
        
        mediaRecorder.onstop = () => {
          finalVideoBlob = new Blob(recordedChunks, { type: 'video/webm' });
          videoPreview.srcObject = null;
          videoPreview.src = URL.createObjectURL(finalVideoBlob);
          videoPreview.controls = true;
          
          videoStream.getTracks().forEach(track => track.stop());
          btnVideoStart.style.display = 'block';
          btnVideoStart.textContent = 'Mulai Ulang Video';
          btnVideoStop.style.display = 'none';
          
          clearInterval(recordingTimer);
          videoStatus.style.display = 'none';
        };

        mediaRecorder.start();
        
        btnVideoStart.style.display = 'none';
        btnVideoStop.style.display = 'block';
        videoStatus.style.display = 'block';
        
        recordSeconds = 0;
        videoTimerLabel.textContent = "00:00 - Sedang merekam...";
        recordingTimer = setInterval(() => {
          recordSeconds++;
          const m = String(Math.floor(recordSeconds / 60)).padStart(2, '0');
          const s = String(recordSeconds % 60).padStart(2, '0');
          videoTimerLabel.textContent = `${m}:${s} - Sedang merekam...`;
        }, 1000);

      } catch (err) {
        alert("Gagal mengakses kamera: " + err.message);
      }
    });

    btnVideoStop.addEventListener('click', () => {
      if (mediaRecorder && mediaRecorder.state === 'recording') {
        mediaRecorder.stop();
      }
    });

    // --- SUBMIT LOGIC ---
    document.getElementById('submit-btn').addEventListener('click', () => {
      const weight = parseFloat(document.getElementById('weight').value);
      const itemsCount = document.getElementById('itemsCount').value;
      
      if (!weight) { alert("Berat (Kg) wajib diisi!"); return; }
      if (mediaRecorder && mediaRecorder.state === 'recording') mediaRecorder.stop();

      const btn = document.getElementById('submit-btn');
      btn.textContent = "Mengunggah & Menyimpan...";
      btn.disabled = true;

      const total = weight * servicePrice;
      const orderId = selectedOrder["Order ID"];
      const custName = selectedOrder["Nama Pelanggan"];

      let base64String = "";
      if (finalPhotoBlob) {
        const reader = new FileReader();
        reader.readAsDataURL(finalPhotoBlob);
        reader.onloadend = function() {
          base64String = reader.result.split(',')[1];
          sendDataToServer(base64String, orderId, custName, weight, itemsCount, total);
        }
      } else {
        sendDataToServer("", orderId, custName, weight, itemsCount, total);
      }
    });

    function sendDataToServer(photoB64, orderId, custName, weight, itemsCount, total) {
      const payload = {
        action: 'update_weight',
        orderId: orderId,
        weight: weight,
        itemsCount: itemsCount,
        totalPrice: total,
        picName: picName,
        photoBase64: photoB64
      };

      fetch(APPS_SCRIPT_URL, {
        method: 'POST',
        body: JSON.stringify(payload)
      })
      .then(res => res.json())
      .then(data => {
        if (data.status === 'success') {
          document.getElementById('form-timbang').style.display = 'none';
          document.getElementById('result-box').style.display = 'block';
          document.getElementById('display-order-id').textContent = orderId;
          
          const qr = qrcode(0, 'M');
          qr.addData(orderId);
          qr.make();
          document.getElementById('qr-code').innerHTML = qr.createImgTag(5, 0);

          document.getElementById('manual-download-box').style.display = 'flex';
          
          let downloadQueue = [];
          const d = new Date();
          const monthNames = ["Jan", "Feb", "Mar", "Apr", "Mei", "Jun", "Jul", "Agu", "Sep", "Okt", "Nov", "Des"];
          const dateStr = String(d.getDate()).padStart(2, '0') + monthNames[d.getMonth()] + d.getFullYear();
          const cleanName = custName.replace(/[^a-zA-Z0-9]/g, "_");
          const baseFileName = `HM_${dateStr}_${cleanName}_${weight}Kg_${itemsCount || '0'}Pcs`;

          if (finalVideoBlob) {
            const btnManualVideo = document.getElementById('btn-manual-video');
            const url = URL.createObjectURL(finalVideoBlob);
            btnManualVideo.onclick = () => {
              const a = document.createElement('a'); a.href = url; a.download = baseFileName + "_Video.webm"; a.click();
            };
            btnManualVideo.style.display = 'block';
            downloadQueue.push(() => btnManualVideo.click());
          }

          let delay = 0;
          downloadQueue.forEach(fn => { setTimeout(fn, delay); delay += 1000; });
        } else {
          alert(data.message);
          document.getElementById('submit-btn').textContent = "Simpan Berat & Cetak QR";
          document.getElementById('submit-btn').disabled = false;
        }
      })
      .catch(err => {
        alert("Gagal terhubung ke server.");
        document.getElementById('submit-btn').textContent = "Simpan Berat & Cetak QR";
        document.getElementById('submit-btn').disabled = false;
      });
    }

    document.getElementById('print-btn').addEventListener('click', () => { window.print(); });
    document.getElementById('new-btn').addEventListener('click', () => { loadAntrean(); });

    loadAntrean();
  </script>
</body>
</html>
