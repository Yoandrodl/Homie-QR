<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Timbang - Homie Laundry</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
  <style>
    .wrapper { max-width: 450px; margin: 0 auto; }
    #result-box { display: none; text-align: center; }
    #qr-code { margin: 20px auto; padding: 15px; background: white; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); display: inline-block; }
    .order-id { font-size: 28px; font-weight: 700; color: #2b3a4a; letter-spacing: 2px; margin-bottom: 10px; }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="nav">
      <a href="#" id="back-link" class="back-btn">← Kembali</a>
      <span class="user-badge" id="user-badge">PIC</span>
    </div>

    <div class="card" id="form-card">
      <h2 class="text-center">Stasiun Timbang</h2>
      <p class="subtitle">Masukkan detail pesanan baru.</p>
      
      <div class="form-group">
        <label>Nama Pelanggan</label>
        <input type="text" id="custName" placeholder="Contoh: Budi Santoso">
      </div>
      <div class="form-group">
        <label>Berat (Kg)</label>
        <input type="number" step="0.1" id="weight" placeholder="Contoh: 3.5">
      </div>
      <div class="form-group" style="margin-bottom: 25px;">
        <label>Jumlah Pakaian (Pcs)</label>
        <input type="number" id="itemsCount" placeholder="Contoh: 15">
      </div>

      <div style="margin-bottom: 25px; border-top: 1px dashed rgba(0,0,0,0.1); padding-top: 15px;">
        <label style="margin-bottom: 15px;">Dokumentasi (SOP)</label>
        
        <!-- Foto Timbangan -->
        <div style="display: flex; gap: 10px; margin-bottom: 15px; align-items: center;">
          <button id="btn-foto" class="btn btn-secondary" style="margin: 0; flex: 1;">📷 Ambil Foto Timbangan</button>
          <img id="preview-foto" style="width: 50px; height: 50px; object-fit: cover; border-radius: 8px; border: 1px solid #ccc; display: none;">
          <input type="file" id="input-foto" accept="image/*" capture="environment" style="display: none;">
        </div>

        <!-- Video Unboxing -->
        <div style="display: flex; flex-direction: column; gap: 10px;">
          <button id="btn-video-start" class="btn btn-secondary" style="margin: 0;">🎥 Mulai Rekam Video</button>
          <button id="btn-video-stop" class="btn" style="margin: 0; background: #c92a2a; display: none;">🛑 Berhenti Merekam</button>
          
          <video id="video-preview" autoplay muted playsinline style="width: 100%; max-height: 250px; object-fit: cover; border-radius: 12px; background: #000; display: none;"></video>
          <div id="video-status" style="font-size: 12px; color: #888; text-align: center; display: none;">Status: <span id="video-timer">Menunggu...</span></div>
        </div>
      </div>
      
      <button id="submit-btn" class="btn">Buat Pesanan & Buat QR</button>
    </div>

    <div class="card" id="result-box">
      <h3 style="color: #27ae60; margin-top:0; font-size: 22px;">Pesanan Berhasil! 🎉</h3>
      <p style="margin-bottom: 5px;">Order ID:</p>
      <div class="order-id" id="display-order-id"></div>
      <div id="qr-code"></div>
      <div id="manual-download-box" style="margin-top: 15px; display: none; gap: 8px; flex-direction: column;">
        <button id="btn-manual-foto" class="btn btn-secondary" style="font-size: 13px; padding: 10px; margin-top: 0; display: none;">⬇️ Unduh Ulang Foto</button>
        <button id="btn-manual-video" class="btn btn-secondary" style="font-size: 13px; padding: 10px; margin-top: 0; display: none;">⬇️ Unduh Ulang Video</button>
      </div>
      <button id="print-btn" class="btn" style="background: linear-gradient(135deg, #72bde6, #4a90e2); box-shadow: 0 4px 15px rgba(74, 144, 226, 0.3); margin-top: 15px;">🖨️ Print Struk / QR</button>
      <button id="new-btn" class="btn btn-secondary" style="margin-top: 12px;">Buat Pesanan Lain</button>
    </div>

    <a href="kanban.html" class="btn btn-secondary" style="display: block; text-align: center; margin-top: 20px; text-decoration: none;">📊 Lihat Laporan Operasional</a>
  </div>

  <script>
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwmVsqTzRc1kHwbjarDIU7p_ghxPiDgVHBM_Bds1p-4FYEOWrL1s1wkLriH-x4TD_M56A/exec";
    
    const role = localStorage.getItem('homie_role');
    const picName = localStorage.getItem('homie_name');

    if (!role || (role !== 'Timbang' && role !== 'Admin')) {
      window.location.href = "index.html";
    }

    document.getElementById('user-badge').textContent = picName + " (Timbang)";
    
    document.getElementById('back-link').addEventListener('click', (e) => {
      e.preventDefault();
      if (role === 'Admin') window.location.href = "admin.html";
      else { localStorage.clear(); window.location.href = "index.html"; }
    });

    // --- FOTO LOGIC ---
    let finalPhotoBlob = null;
    document.getElementById('btn-foto').addEventListener('click', () => {
      document.getElementById('input-foto').click();
    });
    
    document.getElementById('input-foto').addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (!file) return;
      
      const reader = new FileReader();
      reader.onload = function(event) {
        const img = new Image();
        img.onload = function() {
          const canvas = document.createElement('canvas');
          const max_size = 800;
          let width = img.width;
          let height = img.height;

          if (width > height && width > max_size) {
            height *= max_size / width;
            width = max_size;
          } else if (height > max_size) {
            width *= max_size / height;
            height = max_size;
          }

          canvas.width = width;
          canvas.height = height;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, width, height);
          
          canvas.toBlob((blob) => {
            finalPhotoBlob = blob;
            const url = URL.createObjectURL(blob);
            document.getElementById('preview-foto').src = url;
            document.getElementById('preview-foto').style.display = 'block';
            document.getElementById('btn-foto').textContent = "📷 Foto Tersimpan (Ganti?)";
          }, 'image/jpeg', 0.6); // 60% quality compression
        }
        img.src = event.target.result;
      }
      reader.readAsDataURL(file);
    });

    // --- VIDEO LOGIC ---
    let mediaRecorder;
    let recordedChunks = [];
    let finalVideoBlob = null;
    let videoStream = null;
    let videoInterval;
    let videoSeconds = 0;

    const btnVideoStart = document.getElementById('btn-video-start');
    const btnVideoStop = document.getElementById('btn-video-stop');
    const videoPreview = document.getElementById('video-preview');
    const videoStatus = document.getElementById('video-status');
    const videoTimer = document.getElementById('video-timer');

    btnVideoStart.addEventListener('click', async () => {
      try {
        videoStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", width: 640 }, audio: true });
        videoPreview.srcObject = videoStream;
        videoPreview.style.display = 'block';
        videoStatus.style.display = 'block';
        
        let options = { mimeType: 'video/webm;codecs=vp8,opus' };
        if (!MediaRecorder.isTypeSupported(options.mimeType)) {
          options = { mimeType: 'video/webm' };
          if (!MediaRecorder.isTypeSupported(options.mimeType)) {
            options = { mimeType: 'video/mp4' };
            if (!MediaRecorder.isTypeSupported(options.mimeType)) {
              options = {}; // let browser decide
            }
          }
        }
        
        mediaRecorder = new MediaRecorder(videoStream, options);
        
        mediaRecorder.ondataavailable = (e) => {
          if (e.data.size > 0) recordedChunks.push(e.data);
        };
        
        mediaRecorder.onstop = () => {
          const ext = options.mimeType && options.mimeType.includes('mp4') ? 'mp4' : 'webm';
          finalVideoBlob = new Blob(recordedChunks, { type: options.mimeType || 'video/webm' });
          finalVideoBlob.ext = ext;
          videoPreview.srcObject = null;
          videoPreview.src = URL.createObjectURL(finalVideoBlob);
          videoPreview.controls = true; 
          videoTimer.textContent = "Selesai merekam.";
          
          videoStream.getTracks().forEach(track => track.stop());
        };
        
        recordedChunks = [];
        mediaRecorder.start();
        btnVideoStart.style.display = 'none';
        btnVideoStop.style.display = 'block';
        
        videoSeconds = 0;
        videoTimer.textContent = "Merekam... 00:00";
        videoInterval = setInterval(() => {
          videoSeconds++;
          const m = String(Math.floor(videoSeconds / 60)).padStart(2, '0');
          const s = String(videoSeconds % 60).padStart(2, '0');
          videoTimer.textContent = `Merekam... ${m}:${s}`;
        }, 1000);

      } catch (err) {
        alert("Gagal mengakses kamera: " + err.message);
      }
    });

    btnVideoStop.addEventListener('click', () => {
      if (mediaRecorder && mediaRecorder.state !== "inactive") {
        mediaRecorder.stop();
        clearInterval(videoInterval);
        btnVideoStop.style.display = 'none';
        btnVideoStart.style.display = 'block';
        btnVideoStart.textContent = "🎥 Rekam Ulang";
      }
    });

    // --- AUTO DOWNLOAD UTILITY ---
    function triggerDownload(blob, filename) {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.style.display = 'none';
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      setTimeout(() => {
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      }, 500);
    }

    document.getElementById('submit-btn').addEventListener('click', () => {
      // Force stop video if they forgot to click stop
      if (mediaRecorder && mediaRecorder.state === "recording") {
        mediaRecorder.stop();
        clearInterval(videoInterval);
        document.getElementById('btn-video-stop').style.display = 'none';
        document.getElementById('btn-video-start').style.display = 'block';
        document.getElementById('btn-video-start').textContent = "🎥 Rekam Ulang";
      }

      const custName = document.getElementById('custName').value.trim();
      const weight = document.getElementById('weight').value.trim();
      const itemsCount = document.getElementById('itemsCount').value.trim();
      const btn = document.getElementById('submit-btn');

      if (!custName || !weight || !itemsCount) {
        alert("Harap lengkapi semua data!");
        return;
      }

      btn.textContent = "Menyimpan...";
      btn.disabled = true;

      fetch(APPS_SCRIPT_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({ 
          action: 'create_order', 
          customerName: custName, 
          weight: weight,
          itemsCount: itemsCount,
          picName: picName
        })
      })
      .then(res => res.json())
      .then(data => {
        if (data.status === 'success') {
          document.getElementById('form-card').style.display = 'none';
          document.getElementById('result-box').style.display = 'block';
          document.getElementById('display-order-id').textContent = data.orderId;
          
          // Generate QR
          const qr = qrcode(0, 'M');
          qr.addData(data.orderId);
          qr.make();
          document.getElementById('qr-code').innerHTML = qr.createImgTag(6, 0);

          // Auto Download Documentation
          const d = new Date();
          const months = ["Jan", "Feb", "Mar", "Apr", "Mei", "Jun", "Jul", "Ags", "Sep", "Okt", "Nov", "Des"];
          const dateStr = `${d.getDate()}${months[d.getMonth()]}${d.getFullYear()}`;
          const safeName = custName.replace(/[^a-zA-Z0-9 ]/g, '').trim().replace(/ /g, '_');
          const baseFilename = `[HOMIE]_${dateStr}_${safeName}_${weight}Kg_${itemsCount}Pcs`;

          let delay = 0;
          let showManualBox = false;

          if (finalPhotoBlob) {
            triggerDownload(finalPhotoBlob, `${baseFilename}_Foto.jpg`);
            delay = 1000;
            
            showManualBox = true;
            const btnMFoto = document.getElementById('btn-manual-foto');
            btnMFoto.style.display = 'block';
            btnMFoto.onclick = () => triggerDownload(finalPhotoBlob, `${baseFilename}_Foto.jpg`);
          }
          
          if (finalVideoBlob) {
            setTimeout(() => {
              triggerDownload(finalVideoBlob, `${baseFilename}_Video.${finalVideoBlob.ext || 'webm'}`);
            }, delay);

            showManualBox = true;
            const btnMVideo = document.getElementById('btn-manual-video');
            btnMVideo.style.display = 'block';
            btnMVideo.onclick = () => triggerDownload(finalVideoBlob, `${baseFilename}_Video.${finalVideoBlob.ext || 'webm'}`);
          }
          
          if (showManualBox) {
            document.getElementById('manual-download-box').style.display = 'flex';
          }
        } else {
          alert(data.message);
          btn.textContent = "Buat Pesanan & Buat QR";
          btn.disabled = false;
        }
      })
      .catch(err => {
        alert("Gagal terhubung ke database.");
        btn.textContent = "Buat Pesanan & Buat QR";
        btn.disabled = false;
      });
    });

    document.getElementById('print-btn').addEventListener('click', () => {
      window.print();
    });

    document.getElementById('new-btn').addEventListener('click', () => {
      document.getElementById('custName').value = "";
      document.getElementById('weight').value = "";
      document.getElementById('itemsCount').value = "";
      document.getElementById('submit-btn').textContent = "Buat Pesanan & Buat QR";
      document.getElementById('submit-btn').disabled = false;
      document.getElementById('form-card').style.display = 'block';
      document.getElementById('result-box').style.display = 'none';
    });
  </script>
</body>
</html>
